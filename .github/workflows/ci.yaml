name: CI
env:
  MIDNIGHTCI_PACKAGES_WRITE: ${{ secrets.MIDNIGHTCI_PACKAGES_WRITE }}

permissions: {}

on:
  push:
    branches:
      - 'main'
  pull_request:
  workflow_dispatch:
  schedule:
    - cron: "30 4 * * *"

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      build_c_js: ${{ steps.build-targets.outputs.compact-js }}
      build_p_js: ${{ steps.build-targets.outputs.platform-js }}

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # ratchet:actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Determine Build Targets
        uses: dorny/paths-filter@fbd0ab8f3e69293af611ebaee6363fc25e6d187d
        id: build-targets
        with:
          filters: |
            compact-js:
              - 'compact-js/**'
            platform-js:
              - 'platform-js/**'

  ci-platformjs:
    needs: ci
    name: Build, Lint and Test Platform.js
    permissions:
      contents: read
      checks: write
      pull-requests: write
    with:
      should_run: ${{ needs.ci.outputs.build_p_js }}
    uses: ./.github/workflows/ci-platform-js.yaml
    secrets: inherit

  ci-compactjs:
    needs: ci
    name: Build, Lint and Test Compact.js
    permissions:
      contents: read
      checks: write
      pull-requests: write
    with:
      should_run: ${{ needs.ci.outputs.build_c_js }}
    uses: ./.github/workflows/ci-compact-js.yaml
    secrets: inherit
