compressionLevel: mixed

enableGlobalCache: false

nodeLinker: node-modules

# Upstream @midnight-ntwrk/* dependencies (compact-runtime, midnight-js-compact,
# wallet-sdk-address-format, …) still live on GitHub Packages, so install-time
# auth for the dashed scope points there. Our own packages publish to npmjs
# under @midnightntwrk (default registry) via the CD workflow, not yarn.
npmScopes:
  midnight-ntwrk:
    npmAlwaysAuth: true
    npmRegistryServer: "https://npm.pkg.github.com/"

yarnPath: .yarn/releases/yarn-4.10.3.cjs
