# Wait 7 days before resolving newly published package versions, to reduce exposure to
# malicious or unstable releases (supply-chain age gate; requires Yarn >= 4.10).
npmMinimalAgeGate: "7d"

npmScopes:
  midnight-ntwrk:
    npmAlwaysAuth: true
    npmPublishRegistry: "https://npm.pkg.github.com/"
    npmRegistryServer: "https://npm.pkg.github.com/"
  midnightntwrk:
    npmRegistryServer: "https://registry.npmjs.org/"
